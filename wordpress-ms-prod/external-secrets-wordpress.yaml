apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: wordpress-ms-external-secrets
  namespace: wordpress-ms-prod
spec:
  secretStoreRef:
    kind: SecretStore
    name: wordpress-ms-prod-secret-store
  refreshInterval: 1h
  target:
    name: wordpress-ms-secrets
    creationPolicy: Owner
    deletionPolicy: Retain
  # All WordPress config/secrets (WORDPRESS_*, S3_UPLOADS_*, SMTP_*, SERVER_NAME,
  # WP_ENVIRONMENT_TYPE) live in ONE GSM secret (wordpress_ms_secrets) as a JSON
  # object keyed by the env var names. `extract` writes one k8s Secret key per
  # field, so wordpress-ms-secrets is identical to the previous per-key form.
  dataFrom:
    - extract:
        key: wordpress_ms_secrets
