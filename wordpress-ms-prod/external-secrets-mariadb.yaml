apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: mariadb-external-secrets
  namespace: wordpress-ms-prod
spec:
  secretStoreRef:
    kind: SecretStore
    name: wordpress-ms-prod-secret-store
  refreshInterval: 1h
  target:
    name: mariadb-secrets
    creationPolicy: Owner
    deletionPolicy: Retain
  # MariaDB creds live in ONE GSM secret (wordpress_ms_mariadb_secrets) as a JSON
  # object keyed by the env var names (MYSQL_*). `extract` writes one k8s Secret
  # key per field, so mariadb-secrets is identical to the previous per-key form.
  dataFrom:
    - extract:
        key: wordpress_ms_mariadb_secrets
