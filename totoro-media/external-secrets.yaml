apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: totoro-media-external-secrets
  namespace: totoro-media
spec:
  secretStoreRef:
    kind: SecretStore
    name: totoro-media-secret-store
  refreshInterval: 1h
  target:
    name: totoro-media-secrets
    creationPolicy: Owner
    deletionPolicy: Retain
  # All app secrets live in ONE GSM secret (totoro_media_secrets) as a JSON object
  # keyed by the env var names below. GSM bills per active secret version, so one
  # bundle costs ~1/17 of the previous seventeen secrets (within the free tier).
  # `extract` parses the JSON and writes one k8s Secret key per field, so the
  # resulting totoro-media-secrets is identical to the previous per-key form.
  dataFrom:
    - extract:
        key: totoro_media_secrets
