apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: totoro-books-external-secrets
  namespace: totoro-books
spec:
  secretStoreRef:
    kind: SecretStore
    name: totoro-books-secret-store
  refreshInterval: 1h
  target:
    name: totoro-books-secrets
    creationPolicy: Owner
    deletionPolicy: Retain
  # All app secrets live in ONE GSM secret (totoro_books_secrets) as a JSON object
  # keyed by the env var names below. GSM bills per active secret version, so one
  # bundle stays within the free tier. `extract` parses the JSON and writes one
  # k8s Secret key per field, producing totoro-books-secrets.
  #
  # Expected JSON fields (UPPER_SNAKE, become Secret keys verbatim):
  #   DB_USER, DB_PASSWORD, GOOGLE_CLIENT_SECRET,
  #   R2_ACCESS_KEY_ID, R2_SECRET_ACCESS_KEY
  dataFrom:
    - extract:
        key: totoro_books_secrets
