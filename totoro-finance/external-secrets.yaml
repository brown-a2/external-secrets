apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: totoro-finance-external-secrets
  namespace: totoro-finance
spec:
  secretStoreRef:
    kind: SecretStore
    name: totoro-finance-secret-store
  refreshInterval: 1h
  target:
    name: totoro-finance-secrets
    creationPolicy: Owner
    deletionPolicy: Retain
  # All app secrets live in ONE GSM secret (totoro_finance_secrets) as a JSON
  # object keyed by the env var names below. GSM bills per active secret version,
  # so one bundle costs ~1/12 of the previous twelve secrets (within the free
  # tier). `extract` parses the JSON and writes one k8s Secret key per field, so
  # the resulting totoro-finance-secrets is identical to the previous per-key form.
  dataFrom:
    - extract:
        key: totoro_finance_secrets
