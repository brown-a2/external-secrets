apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: event-tracker-external-secrets
  namespace: event-tracker
spec:
  secretStoreRef:
    kind: SecretStore
    name: event-tracker-secret-store
  data:
    - secretKey: DB_PORT 
      remoteRef:
        key: db_port
        version: latest
    - secretKey: DB_HOST 
      remoteRef:
        key: db_host
        version: latest
    - secretKey: DB_USER
      remoteRef:
        key: db_user
        version: latest
    - secretKey: DB_PASSWORD
      remoteRef:
        key: db_password
        version: latest
    - secretKey: DB_NAME
      remoteRef:
        key: db_name
        version: latest
    - secretKey: GOOGLE_CLIENT_ID
      remoteRef:
        key: google_client_id
        version: latest
    - secretKey: GOOGLE_CLIENT_SECRET
      remoteRef:
        key: google_client_secret
        version: latest
    - secretKey: GOOGLE_REDIRECT_URL
      remoteRef:
        key: google_redirect_url
        version: latest
    - secretKey: SUPABASE_URL
      remoteRef:
        key: supabase_url
        version: latest
    - secretKey: SUPABASE_ANON_KEY
      remoteRef:
        key: supabase_anon_key
        version: latest
    - secretKey: COOKIE_DOMAIN
      remoteRef:
        key: cookie_domain
        version: latest
  refreshInterval: 1h
  target:
    name: event-tracker-secrets
    creationPolicy: Owner
    deletionPolicy: Retain
