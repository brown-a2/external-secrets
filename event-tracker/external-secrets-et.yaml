apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: event-tracker-external-secrets
  namespace: event-tracker
spec:
  secretStoreRef:
    kind: SecretStore
    name: event-tracker-secret-store
  refreshInterval: 1h
  target:
    name: event-tracker-secrets
    creationPolicy: Owner
    deletionPolicy: Retain
  # All app secrets live in ONE GSM secret (event_tracker_secrets) as a JSON object
  # keyed by the env var names below. GSM bills per active secret version, so one
  # bundle costs ~1/12 of the previous twelve secrets (within the free tier).
  # `extract` parses the JSON and writes one k8s Secret key per field, so the
  # resulting event-tracker-secrets is identical to the previous per-key form.
  dataFrom:
    - extract:
        key: event_tracker_secrets
